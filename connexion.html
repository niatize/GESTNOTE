    <div class="content_1" id="contenue_1" >
            <fieldset class="fieldset">
                <legend align="center" style="border-radius: 50%;">
                    <svg xmlns="http://www.w3.org/2000/svg" class="svg"
                    width="44" height="44" viewBox="0 0 24 24"
                     fill="none" stroke="#33d17a" stroke-width="2"

                </legend>
                <form action="#" id="connexion_form">
                    <table>
                        <tr>
                            <td><label for="user_name">Nom d'utilisateur:</label></td>
                            <td><input type="text" id="user_name" name="user_name" placeholder="nom utilisateur" required></td>
                        </tr>
                        <tr>
                            <td><label for="email">Email</label></td>
                            <td><input type="email" name="email" id="email" placeholder="adresse mail" required></td>
                        </tr>
                        <tr>
                            <td><label for="password">Mot de passe:</label></td>
                            <td><input type="password" id="password" name="password" placeholder="mot de passe" required></td>
                        </tr>
                        <tr>
                            <td><label for="loock_password">Voir le mot de passe</label></td>
                            <td><input type="checkbox" id="loock_password" name="loock_password"></td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                Je n'ai pas de compte ? <a href="#" id="a">Créer un compte !</a>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" align="center"><input type="submit" id="sub" value="SE CONNECTER"></td>
                        </tr>
                    </table>
                            <div class="rotate" id="rotate"></div>
                </form>
            </fieldset>
    </div><br>
 

    <div class="content_1" id="content_2">
                <div class="container">
                <div class="content">

                        <h1 align="center">QUI ESTES VOUS ?</h1><br><br>
                        <form action="#" method="post" id="connexion_form_2">
                            <table>
                                <tr>
                                    <td><input type="radio" id="professeur" name="personne_se_connectant" value="professeur" required> </td>
                                    <td><label for="professeur">Un professeur</label></td>
                                </tr>
                                <tr>

                                </tr>
                                <tr>
                                    <td><input type="radio" id="Administration" name="personne_se_connectant" value="Administration" required> </td>

                                </tr>
                                <tr>

                                </tr>
